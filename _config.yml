title: "Blog của Nguyễn Năng Anh"
description: "Blog cá nhân trên GitHub Pages với Jekyll"
theme: minima

# Kích hoạt theme tối
minima:
  skin: dark

# Cấu hình tác giả và các liên kết mạng xã hội
author:
  name: "Nguyễn Năng Anh"
  links:
    - label: "Facebook"
      url: "https://facebook.com/your_facebook_username" # Thay bằng tên người dùng Facebook của bạn
    - label: "TikTok"
      url: "https://tiktok.com/@your_tiktok_username" # Thay bằng tên người dùng TikTok của bạn
    - label: "Instagram"
      url: "https://instagram.com/your_instagram_username" # Thay bằng tên người dùng Instagram của bạn
    - label: "LinkedIn"
      url: "https://linkedin.com/in/your_linkedin_username" # Thay bằng tên người dùng LinkedIn của bạn
    - label: "GitHub"
      url: "https://github.com/nguyennanganh" # Đường dẫn GitHub của bạn

# Thông tin cấu hình bài đăng
markdown: kramdown
highlighter: rouge
permalink: /:categories/:year-:month-:day/:title/

# Tùy chỉnh khác (có thể thêm nếu cần)
url: "https://nguyennanganh.github.io" # Địa chỉ GitHub Pages của bạn
baseurl: "" # Để trống nếu blog của bạn ở tên miền gốc của GitHub Pages
